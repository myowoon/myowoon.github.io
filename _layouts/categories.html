---
layout: default
---

<h1 class="post-title">{{ page.title | escape }}</h1>

<ul class="categories-list">
  {%- for category in site.categories -%}

    <li>
      <h3>
        <a href="{{ site.baseurl }}/categories/{{ category[0] }}">
          {{ category[0] }}
        </a>
      </h3>
    </li>
  {%- endfor -%}
</ul>
